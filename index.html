<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>txttrend</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
  }

  /* PAGE NORMALE */
  .container {
    padding:20px;
    max-width:800px;
    margin:auto;
  }

  textarea {
    width:100%;
    height:200px;
    background:#111;
    color:#fff;
    border:1px solid #444;
    padding:10px;
    font-size:16px;
  }

  button {
    margin-top:15px;
    padding:12px 20px;
    font-size:14px;
    text-transform:uppercase;
    cursor:pointer;
    border:none;
  }

  #start { background:white; color:black; }
  #invert { background:black; color:white; border:1px solid white; }

  /* MODE TEXTE GÉANT */
  #fullscreenMode {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    color:white;
    overflow:hidden;
  }

  #scrollText {
    position:absolute;
    width:100%;
    top:100%;
    font-size:10vw;
    font-weight:900;
    text-transform:uppercase;
    white-space:pre-wrap;
    text-align:center;
    line-height:1.1;
  }

  /* ANIMATION DEFILEMENT */
  @keyframes scrollUp {
    from { top:100%; }
    to { top:-200%; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>txttrend</h1>
  <p>Écris ton texte, puis lance-le en mode géant.</p>

  <textarea id="textInput" placeholder="Ton texte ici..."></textarea>

  <button id="start">Lancer le texte</button>
  <button id="invert">Mode inversé</button>
</div>

<!-- MODE PLEIN ÉCRAN -->
<div id="fullscreenMode">
  <div id="scrollText"></div>
</div>

<script>
  const startBtn = document.getElementById("start");
  const invertBtn = document.getElementById("invert");
  const textInput = document.getElementById("textInput");
  const fullscreen = document.getElementById("fullscreenMode");
  const scrollText = document.getElementById("scrollText");

  let inverted = false;

  // MODE INVERSÉ
  invertBtn.onclick = () => {
    inverted = !inverted;
    invertBtn.textContent = inverted ? "Mode normal" : "Mode inversé";
  };

  // LANCER LE TEXTE
  startBtn.onclick = () => {
    const txt = textInput.value.trim();
    if (!txt) return;

    // Appliquer couleurs selon mode
    fullscreen.style.background = inverted ? "white" : "black";
    scrollText.style.color = inverted ? "black" : "white";

    scrollText.textContent = txt.toUpperCase();

    fullscreen.style.display = "block";

    // Animation
    scrollText.style.animation = "none";
    void scrollText.offsetWidth; // reset animation
    scrollText.style.animation = "scrollUp 12s linear forwards";

    // Plein écran natif
    if (!document.fullscreenElement) {
      fullscreen.requestFullscreen?.();
    }
  };

  // Quitter plein écran avec Échap
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      fullscreen.style.display = "none";
    }
  });
</script>

</body>
</html>
