<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>txttrend</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    color:#fff;
    font-family: Inter, Arial, sans-serif;
  }

  /* PAGE PRINCIPALE */
  .ui {
    padding:20px;
    max-width:700px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
  }

  textarea {
    width:100%;
    height:160px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    resize:none;
  }

  .row {
    display:flex;
    gap:10px;
  }

  button {
    flex:1;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:14px;
    text-transform:uppercase;
    font-weight:600;
    cursor:pointer;
  }

  #start { background:#fff; color:#000; }
  #mirror { background:#000; color:#fff; border:1px solid #fff; }

  input[type="range"] {
    width:100%;
  }

  /* MODE TEXTE GÉANT */
  #fullscreen {
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    overflow:hidden;
  }

  #wrapper {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    white-space:nowrap;
  }

  #text {
    display:inline-block;
    font-weight:900;
    text-transform:uppercase;
    white-space:nowrap;
    line-height:1;
  }

  /* Miroir */
  .mirror {
    transform:scaleX(-1);
  }

  /* Défilement */
  @keyframes scroll {
    from { transform:translateX(100%); }
    to { transform:translateX(-200%); }
  }
</style>
</head>
<body>

<div class="ui">
  <textarea id="input" placeholder="Écris ici..."></textarea>

  <label>Vitesse</label>
  <input type="range" id="speed" min="5" max="60" value="20">

  <label>Taille du texte</label>
  <input type="range" id="size" min="10" max="40" value="20">

  <div class="row">
    <button id="start">Lancer</button>
    <button id="mirror">Miroir</button>
  </div>
</div>

<div id="fullscreen">
  <div id="wrapper">
    <div id="text"></div>
  </div>
</div>

<script>
  const input = document.getElementById("input");
  const speed = document.getElementById("speed");
  const size = document.getElementById("size");
  const start = document.getElementById("start");
  const mirrorBtn = document.getElementById("mirror");

  const fullscreen = document.getElementById("fullscreen");
  const text = document.getElementById("text");

  let mirrored = false;

  mirrorBtn.onclick = () => {
    mirrored = !mirrored;
    mirrorBtn.textContent = mirrored ? "Normal" : "Miroir";
    text.classList.toggle("mirror", mirrored);
  };

  start.onclick = () => {
    const content = input.value.trim();
    if (!content) return;

    text.textContent = content.toUpperCase();

    text.style.fontSize = size.value + "vw";

    const duration = 80 - speed.value;
    text.style.animation = `scroll ${duration}s linear infinite`;

    fullscreen.style.display = "block";

    fullscreen.requestFullscreen?.();
  };

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      fullscreen.style.display = "none";
      text.style.animation = "none";
    }
  });
</script>

</body>
</html>
