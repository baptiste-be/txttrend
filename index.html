<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>txttrend</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
  }

  /* PAGE NORMALE */
  .container {
    padding:20px;
    max-width:900px;
    margin:auto;
  }

  textarea {
    width:100%;
    height:180px;
    background:#111;
    color:#fff;
    border:1px solid #444;
    padding:10px;
    font-size:16px;
  }

  label { display:block; margin-top:15px; font-size:14px; }

  input[type="range"] {
    width:100%;
  }

  button {
    margin-top:15px;
    padding:12px 20px;
    font-size:14px;
    text-transform:uppercase;
    cursor:pointer;
    border:none;
  }

  #start { background:white; color:black; }
  #invert { background:black; color:white; border:1px solid white; }

  /* MODE TEXTE GÉANT */
  #fullscreenMode {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    color:white;
    overflow:hidden;
  }

  #scrollText {
    position:absolute;
    left:100%;
    white-space:nowrap;
    font-weight:900;
    text-transform:uppercase;
  }

  @keyframes scrollSide {
    from { left:100%; }
    to { left:-200%; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>txttrend</h1>
  <p>Écris ton texte, choisis la vitesse et le style, puis lance-le.</p>

  <textarea id="textInput" placeholder="Ton texte ici..."></textarea>

  <label>Vitesse du défilement</label>
  <input type="range" id="speed" min="5" max="40" value="15">

  <label>Taille du texte</label>
  <input type="range" id="size" min="5" max="20" value="10">

  <label>Espacement des lettres</label>
  <input type="range" id="spacing" min="0" max="40" value="5">

  <button id="start">Lancer le texte</button>
  <button id="invert">Mode inversé</button>
</div>

<!-- MODE PLEIN ÉCRAN -->
<div id="fullscreenMode">
  <div id="scrollText"></div>
</div>

<script>
  const startBtn = document.getElementById("start");
  const invertBtn = document.getElementById("invert");
  const textInput = document.getElementById("textInput");
  const fullscreen = document.getElementById("fullscreenMode");
  const scrollText = document.getElementById("scrollText");

  const speed = document.getElementById("speed");
  const size = document.getElementById("size");
  const spacing = document.getElementById("spacing");

  let inverted = false;

  invertBtn.onclick = () => {
    inverted = !inverted;
    invertBtn.textContent = inverted ? "Mode normal" : "Mode inversé";
  };

  startBtn.onclick = () => {
    const txt = textInput.value.trim();
    if (!txt) return;

    fullscreen.style.background = inverted ? "white" : "black";
    scrollText.style.color = inverted ? "black" : "white";

    scrollText.textContent = txt.toUpperCase();

    scrollText.style.fontSize = size.value + "vw";
    scrollText.style.letterSpacing = spacing.value + "px";

    const duration = 60 - speed.value;
    scrollText.style.animation = `scrollSide ${duration}s linear infinite`;

    fullscreen.style.display = "block";

    if (!document.fullscreenElement) {
      fullscreen.requestFullscreen?.();
    }
  };

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      fullscreen.style.display = "none";
      scrollText.style.animation = "none";
    }
  });
</script>

</body>
</html>
