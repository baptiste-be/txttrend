<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>txttrend</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    color:#fff;
    font-family: Inter, Arial, sans-serif;
  }

  /* UI */
  .ui {
    padding:20px;
    max-width:700px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
  }

  textarea {
    width:100%;
    height:150px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    padding:12px;
    font-size:18px;
    border-radius:8px;
    resize:none;
  }

  button {
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    text-transform:uppercase;
  }

  #start { background:#fff; color:#000; }
  #mirror { background:#000; color:#fff; border:1px solid #fff; }

  input[type="range"] { width:100%; }

  /* FULLSCREEN */
  #fullscreen {
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    overflow:hidden;
  }

  #wrapper {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    white-space:nowrap;
  }

  #text {
    display:inline-block;
    font-weight:900;
    text-transform:uppercase;
    white-space:nowrap;
    line-height:1;
    transform-origin:center;
  }

  /* MIRROR */
  .mirror {
    transform:scaleX(-1);
  }

  /* ANIMATION */
  @keyframes scroll {
    from { transform:translateX(100%); }
    to { transform:translateX(-200%); }
  }
</style>
</head>
<body>

<div class="ui">
  <textarea id="input" placeholder="Écris ici..."></textarea>

  <label>Vitesse</label>
  <input type="range" id="speed" min="5" max="100" value="40">

  <label>Taille du texte</label>
  <input type="range" id="size" min="10" max="40" value="20">

  <button id="start">Lancer</button>
  <button id="mirror">Miroir</button>
</div>

<div id="fullscreen">
  <div id="wrapper">
    <div id="text"></div>
  </div>
</div>

<script>
  const input = document.getElementById("input");
  const speed = document.getElementById("speed");
  const size = document.getElementById("size");
  const start = document.getElementById("start");
  const mirrorBtn = document.getElementById("mirror");

  const fullscreen = document.getElementById("fullscreen");
  const text = document.getElementById("text");

  let mirrored = false;

  mirrorBtn.onclick = () => {
    mirrored = !mirrored;
    text.classList.toggle("mirror", mirrored);
    mirrorBtn.textContent = mirrored ? "Normal" : "Miroir";
  };

  start.onclick = () => {
    const content = input.value.trim();
    if (!content) return;

    text.textContent = content.toUpperCase();

    // Taille responsive (jamais minuscule)
    text.style.fontSize = size.value + "vw";

    // Vitesse réelle
    const duration = 120 - speed.value; 
    text.style.animation = `scroll ${duration}s linear infinite`;

    fullscreen.style.display = "block";
    fullscreen.requestFullscreen?.();
  };

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      fullscreen.style.display = "none";
      text.style.animation = "none";
    }
  });
</script>

</body>
</html>
