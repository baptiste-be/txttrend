<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>txttrend</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    color:#fff;
    font-family: Arial, sans-serif;
  }

  .ui {
    padding:20px;
    max-width:700px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:15px;
  }

  textarea {
    width:100%;
    height:150px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    padding:14px;
    font-size:18px;
    border-radius:10px;
    resize:none;
  }

  button {
    padding:14px;
    border-radius:8px;
    border:none;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    text-transform:uppercase;
  }

  #start { background:#fff; color:#000; }
  #mirror { background:#000; color:#fff; border:1px solid #fff; }

  #fullscreen {
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    overflow:hidden;
  }

  #outer {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    white-space:nowrap;
  }

  #inner {
    display:inline-block;
    white-space:nowrap;
    font-weight:900;
    text-transform:uppercase;
    line-height:1;
    font-size:clamp(3rem, 12vw, 10rem);
  }

  /* miroir visuel */
  .flip {
    transform:scaleX(-1);
  }

  @keyframes scroll {
    from { transform:translateX(100%); }
    to   { transform:translateX(-200%); }
  }
</style>
</head>
<body>

<div class="ui">
  <textarea id="input" placeholder="Écris ici..."></textarea>
  <button id="start">Lancer</button>
  <button id="mirror">Miroir</button>
</div>

<div id="fullscreen">
  <div id="outer">
    <div id="inner"></div>
  </div>
</div>

<script>
  const input = document.getElementById("input");
  const start = document.getElementById("start");
  const mirrorBtn = document.getElementById("mirror");

  const fullscreen = document.getElementById("fullscreen");
  const outer = document.getElementById("outer");
  const inner = document.getElementById("inner");

  let mirrorMode = false;

  // Fonction miroir parfait : ordre inversé + flip horizontal
  function mirrorText(str) {
    return str.split("").reverse().join("");
  }

  mirrorBtn.onclick = () => {
    mirrorMode = !mirrorMode;
    mirrorBtn.textContent = mirrorMode ? "Normal" : "Miroir";
  };

  start.onclick = () => {
    let txt = input.value.trim().toUpperCase();
    if (!txt) return;

    // miroir parfait
    if (mirrorMode) {
      txt = mirrorText(txt);
      outer.classList.add("flip");
    } else {
      outer.classList.remove("flip");
    }

    inner.textContent = txt;

    inner.style.animation = `scroll 18s linear infinite`;

    fullscreen.style.display = "block";
    fullscreen.requestFullscreen?.();
  };

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      fullscreen.style.display = "none";
      inner.style.animation = "none";
      document.exitFullscreen?.();
    }
  });
</script>

</body>
</html>
